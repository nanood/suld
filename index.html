<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сүлд Систем - Нүүр хуудас</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem; overflow: hidden; position: relative;
    }
    body::before, body::after {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.25; animation: float 8s ease-in-out infinite;
    }
    body::before { width:500px;height:500px;background:radial-gradient(circle,#3b82f6,#8b5cf6);top:-100px;left:-100px; }
    body::after  { width:400px;height:400px;background:radial-gradient(circle,#06b6d4,#2563eb);bottom:-80px;right:-80px;animation-delay:4s; }
    @keyframes float { 0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(30px) scale(1.05)} }
    .card {
      background:rgba(255,255,255,0.06);backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.12);border-radius:28px;
      padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;
      position:relative;z-index:1;
      box-shadow:0 32px 80px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);
      animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
    .logo-ring {
      width:90px;height:90px;border-radius:50%;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 1.75rem;
      box-shadow:0 8px 32px rgba(59,130,246,.5),0 0 0 12px rgba(59,130,246,.12);
      animation:pulse-ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100%{box-shadow:0 8px 32px rgba(59,130,246,.5),0 0 0 12px rgba(59,130,246,.12)}
      50%{box-shadow:0 8px 32px rgba(139,92,246,.6),0 0 0 20px rgba(139,92,246,.08)}
    }
    .logo-ring .material-icons-round { font-size:2.5rem;color:#fff; }
    h1 { font-size:2rem;font-weight:900;color:#fff;letter-spacing:.03em;margin-bottom:.5rem; }
    .subtitle { font-size:.95rem;color:rgba(255,255,255,.55);margin-bottom:2.25rem;line-height:1.6; }
    .btn-group { display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem; }
    .login-btn {
      display:inline-flex;align-items:center;justify-content:center;gap:.6rem;
      background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
      font-size:1rem;font-weight:800;padding:14px 36px;border-radius:14px;
      text-decoration:none;box-shadow:0 8px 28px rgba(245,158,11,.4);
      transition:transform .18s,box-shadow .18s;letter-spacing:.02em;
    }
    .login-btn:hover { transform:translateY(-3px) scale(1.03);box-shadow:0 14px 36px rgba(245,158,11,.5); }
    .login-btn:active { transform:scale(.97); }
    .login-btn .material-icons-round { font-size:1.15rem; }
    .admin-btn {
      display:inline-flex;align-items:center;justify-content:center;gap:.6rem;
      background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);
      font-size:.88rem;font-weight:700;padding:11px 28px;border-radius:12px;
      text-decoration:none;border:1px solid rgba(255,255,255,.12);
      transition:all .18s;letter-spacing:.02em;
    }
    .admin-btn:hover { background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.22); }
    .admin-btn .material-icons-round { font-size:1rem; }
    .divider { width:48px;height:3px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;margin:0 auto 2rem; }
    .info-grid { display:grid;grid-template-columns:1fr 1fr;gap:.75rem; }
    .info-chip {
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:.5rem;
    }
    .info-chip .material-icons-round { font-size:1rem;color:#60a5fa; }
    .info-chip div { text-align:left; }
    .info-chip .label { font-size:.65rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em; }
    .info-chip .value { font-size:.8rem;color:rgba(255,255,255,.8);font-weight:600;margin-top:1px; }
    .status-dot { display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:6px;box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }
    .status-badge {
      display:inline-flex;align-items:center;
      background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);
      color:#86efac;font-size:.75rem;font-weight:700;
      padding:5px 14px;border-radius:99px;margin-bottom:1.5rem;letter-spacing:.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-ring"><span class="material-icons-round">shield</span></div>
    <div class="status-badge"><span class="status-dot"></span>СЕРВЕР АЖИЛЛАЖ БАЙНА</div>
    <h1>Сүлд Систем</h1>
    <p class="subtitle">Хяналтын удирдлагын систем<br>амжилттай ачааллагдлаа.</p>
    <div class="btn-group">
      <!-- Нэвтрэх товч — login.html руу -->
      <a href="login.html" class="login-btn">
        <span class="material-icons-round">login</span>
        Нэвтрэх
        <span class="material-icons-round">arrow_forward</span>
      </a>
      <!-- Admin — зөвхөн admin хэрэглэгчдэд -->
      <a href="register.html" class="admin-btn">
        <span class="material-icons-round">admin_panel_settings</span>
        Бүртгүүлэх
      </a>
    </div>
    <div class="info-grid">
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гэмтэл — Сүлд Систем</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#312e81 100%);font-family:'Segoe UI',system-ui,sans-serif;color:#fff; }
    body::before,body::after { content:'';position:fixed;border-radius:50%;filter:blur(90px);opacity:.1;pointer-events:none;z-index:0; }
    body::before { width:600px;height:600px;background:radial-gradient(circle,#f59e0b,#ef4444);top:-200px;left:-200px; }
    body::after  { width:500px;height:500px;background:radial-gradient(circle,#3b82f6,#8b5cf6);bottom:-150px;right:-150px; }

    /* Header */
    .hdr { position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:1rem;background:rgba(10,16,32,.88);backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,.07);padding:.7rem 2rem; }
    .hdr-brand { display:flex;align-items:center;gap:1rem;text-decoration:none; }
    .hdr-brand img { height:44px;filter:drop-shadow(0 2px 12px rgba(59,130,246,.4)); }
    .brand-name { font-size:1.15rem;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .hdr-user { position:relative;flex-shrink:0; }
    .usr-btn { display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:.45rem .85rem .45rem .5rem;cursor:pointer;color:#fff;font-size:.88rem;transition:background .2s; }
    .usr-btn:hover { background:rgba(255,255,255,.11); }
    .usr-btn.open { border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.12); }
    .av { width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0; }
    .chevron { font-size:1.05rem!important;opacity:.55;transition:transform .2s; }
    .usr-btn.open .chevron { transform:rotate(180deg); }
    .dropdown { position:absolute;top:calc(100% + 10px);right:0;width:270px;background:rgba(10,16,36,.97);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.1);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:opacity .18s,transform .18s;z-index:300; }
    .dropdown.open { opacity:1;transform:none;pointer-events:all; }
    .dp-head { display:flex;align-items:center;gap:1rem;padding:1.2rem 1.2rem .9rem;border-bottom:1px solid rgba(255,255,255,.07); }
    .av-lg { width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0;box-shadow:0 0 0 3px rgba(59,130,246,.2); }
    .dp-nm { font-weight:700;font-size:.95rem; } .dp-sub { font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.15rem; }
    .dp-body { padding:.85rem 1.2rem;display:flex;flex-direction:column;gap:.55rem; }
    .dp-row  { display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:rgba(255,255,255,.6); }
    .dp-row .material-icons-round { font-size:.95rem;color:#60a5fa;flex-shrink:0; }
    .dp-foot { padding:.5rem 1.2rem 1.2rem; }
    .dp-divider { height:1px;background:rgba(255,255,255,.07);margin-bottom:.85rem; }
    .logout-btn { width:100%;display:flex;align-items:center;justify-content:center;gap:.45rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:9px;padding:.55rem;cursor:pointer;font-size:.82rem;font-weight:600;transition:background .2s; }
    .logout-btn:hover { background:rgba(239,68,68,.2); }

    /* Main */
    .main { padding:2rem;max-width:1240px;margin:0 auto;position:relative;z-index:1; }
    .pg-hdr { display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap; }
    .back-btn { display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);border-radius:10px;padding:.5rem .9rem;font-size:.84rem;text-decoration:none;transition:background .2s,color .2s; }
    .back-btn:hover { background:rgba(255,255,255,.11);color:#fff; }
    .back-btn .material-icons-round { font-size:1.05rem; }
    .pg-title { font-size:1.5rem;font-weight:800;display:flex;align-items:center;gap:.6rem; }
    .pg-title .material-icons-round { color:#fbbf24; }
    .count-pill { background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.3);color:#fcd34d;border-radius:20px;padding:.2rem .7rem;font-size:.8rem;font-weight:600; }

    .toolbar { display:flex;gap:.75rem;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap; }
    .search-wrap { flex:1;position:relative;min-width:180px;max-width:340px; }
    .search-wrap .material-icons-round { position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:1.1rem;color:rgba(255,255,255,.35);pointer-events:none; }
    .search-inp { width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:.9rem;font-family:inherit;padding:.65rem .85rem .65rem 2.4rem;outline:none;transition:border-color .2s; }
    .search-inp::placeholder { color:rgba(255,255,255,.28); }
    .search-inp:focus { border-color:#fbbf24;background:rgba(255,255,255,.09); }
    .filter-btn { display:inline-flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);border-radius:10px;padding:.5rem .85rem;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .18s;white-space:nowrap; }
    .filter-btn:hover { background:rgba(255,255,255,.11);color:#fff; }
    .filter-btn.active { background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.4);color:#fcd34d; }
    .add-btn { display:inline-flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;color:#fff;border-radius:11px;padding:.65rem 1.2rem;font-size:.88rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(245,158,11,.35);transition:transform .15s,filter .15s;white-space:nowrap;margin-left:auto; }
    .add-btn:hover { transform:translateY(-2px);filter:brightness(1.1); }
    .add-btn .material-icons-round { font-size:1.1rem; }

    /* Cards */
    .cards-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem; }
    .incident-card { background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:1.15rem 1.25rem .9rem;transition:transform .22s,box-shadow .22s,border-color .22s;animation:fadeUp .4s ease both; }
    .incident-card:hover { transform:translateY(-5px);box-shadow:0 16px 50px rgba(0,0,0,.35);border-color:rgba(245,158,11,.3); }

    .ic-head { display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.75rem; }
    .ic-id   { font-size:.7rem;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em; }
    .ic-date { font-size:.78rem;color:rgba(255,255,255,.45); }
    .ic-branch { display:flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:600;margin-bottom:.7rem;cursor:pointer; }
    .ic-branch .material-icons-round { font-size:1rem;color:#60a5fa; }
    .ic-tags { display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem; }
    .tag { display:inline-flex;align-items:center;gap:.25rem;font-size:.72rem;font-weight:700;border-radius:6px;padding:.25rem .6rem;text-transform:uppercase;letter-spacing:.04em; }
    .tag .material-icons-round { font-size:.8rem; }
    .tag-drunk  { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3);  color:#fca5a5; }
    .tag-theft  { background:rgba(220,38,38,.18);  border:1px solid rgba(220,38,38,.4);  color:#f87171; }
    .tag-traffic{ background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fcd34d; }
    .tag-phone  { background:rgba(59,130,246,.15); border:1px solid rgba(59,130,246,.3); color:#93c5fd; }
    .tag-water  { background:rgba(6,182,212,.15);  border:1px solid rgba(6,182,212,.3);  color:#67e8f9; }
    .tag-police { background:rgba(139,92,246,.15); border:1px solid rgba(139,92,246,.3); color:#c4b5fd; }
    .tag-other  { background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6); }
    .ic-desc { font-size:.8rem;color:rgba(255,255,255,.45);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:.75rem; }
    .ic-foot { display:flex;justify-content:space-between;align-items:center;gap:.5rem; }
    .ic-time { font-size:.75rem;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:.3rem; }
    .ic-time .material-icons-round { font-size:.85rem; }
    .ic-actions { display:flex;gap:.4rem; }
    .ic-btn { display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;transition:background .18s; }
    .ic-btn .material-icons-round { font-size:.95rem; }
    .view-btn { background:rgba(245,158,11,.15);color:#fcd34d; } .view-btn:hover { background:rgba(245,158,11,.28); }
    .edit-btn { background:rgba(59,130,246,.15);color:#93c5fd; }  .edit-btn:hover { background:rgba(59,130,246,.28); }
    .del-btn  { background:rgba(239,68,68,.15);color:#fca5a5; }   .del-btn:hover  { background:rgba(239,68,68,.28); }

    .state-msg { text-align:center;padding:4rem 2rem;color:rgba(255,255,255,.35);font-size:.9rem; }
    .state-msg .material-icons-round { font-size:3rem;display:block;margin-bottom:.75rem; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* Detail modal */
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s; }
    .overlay.open { opacity:1;pointer-events:all; }
    .modal { background:#0d1525;border:1px solid rgba(255,255,255,.12);border-radius:22px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.7); }
    .overlay.open .modal { transform:none; }
    .modal::-webkit-scrollbar { width:5px; }
    .modal::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12);border-radius:3px; }
    .modal-top { position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;background:rgba(13,21,37,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);padding:1.1rem 1.5rem; }
    .modal-title { font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem; }
    .modal-title .material-icons-round { color:#fbbf24; }
    .close-btn { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);cursor:pointer;transition:background .18s; }
    .close-btn:hover { background:rgba(255,255,255,.14);color:#fff; }
    .modal-body { padding:1.5rem; }
    .m-tags { display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.25rem; }
    .info-grid { display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.25rem; }
    @media(max-width:480px){ .info-grid { grid-template-columns:1fr; } }
    .info-item { background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.75rem 1rem; }
    .info-label { font-size:.7rem;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;display:flex;align-items:center;gap:.35rem; }
    .info-label .material-icons-round { font-size:.85rem;color:#fbbf24; }
    .info-val { font-size:.9rem;color:rgba(255,255,255,.85);word-break:break-word; }
    .desc-section { background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:1rem; }
    .desc-label { font-size:.7rem;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;display:flex;align-items:center;gap:.35rem; }
    .desc-label .material-icons-round { font-size:.85rem;color:#fbbf24; }
    .desc-text { font-size:.88rem;color:rgba(255,255,255,.75);line-height:1.6; }

    /* Form modal */
    .form-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:600;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s; }
    .form-overlay.open { opacity:1;pointer-events:all; }
    .form-modal { background:#0d1525;border:1px solid rgba(255,255,255,.12);border-radius:22px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;transform:translateY(24px) scale(.97);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.75); }
    .form-overlay.open .form-modal { transform:none; }
    .form-modal::-webkit-scrollbar { width:5px; }
    .form-modal::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12);border-radius:3px; }
    .fm-top { position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;background:rgba(13,21,37,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);padding:1.1rem 1.5rem; }
    .fm-title { font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem; }
    .fm-title .material-icons-round { color:#fbbf24; }
    .fm-body { padding:1.5rem;display:flex;flex-direction:column;gap:1rem; }
    .fm-grid { display:grid;grid-template-columns:1fr 1fr;gap:1rem; }
    @media(max-width:520px){ .fm-grid { grid-template-columns:1fr; } }
    .fm-full { grid-column:1/-1; }
    .f-group { display:flex;flex-direction:column;gap:.4rem; }
    .f-label { font-size:.74rem;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:.35rem; }
    .f-label .material-icons-round { font-size:.85rem;color:#fbbf24; }
    .f-label .req { color:#f87171;margin-left:.15rem; }
    .f-input,.f-select,.f-textarea { width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:.9rem;font-family:inherit;padding:.6rem .85rem;outline:none;transition:border-color .2s,background .2s; }
    .f-input::placeholder,.f-textarea::placeholder { color:rgba(255,255,255,.28); }
    .f-input:focus,.f-select:focus,.f-textarea:focus { border-color:#fbbf24;background:rgba(255,255,255,.09); }
    .f-select option { background:#1e293b;color:#fff; }
    .f-textarea { resize:vertical;min-height:80px; }
    .f-err { font-size:.75rem;color:#f87171;display:none; }
    .f-err.show { display:block; }

    /* Checkboxes */
    .checks-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem; }
    .chk-item { display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.5rem .7rem;cursor:pointer;transition:background .18s,border-color .18s; }
    .chk-item:hover { background:rgba(255,255,255,.08); }
    .chk-item input[type=checkbox] { width:16px;height:16px;accent-color:#fbbf24;flex-shrink:0;cursor:pointer; }
    .chk-item label { font-size:.82rem;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap; }
    .chk-item:has(input:checked) { background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35); }
    .chk-item:has(input:checked) label { color:#fcd34d; }

    .fm-alert { display:none;align-items:center;gap:.5rem;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:10px;padding:.65rem .9rem;font-size:.83rem;margin-bottom:.5rem; }
    .fm-alert.show { display:flex; }
    .fm-foot { padding:1rem 1.5rem 1.5rem;display:flex;gap:.75rem;justify-content:flex-end;border-top:1px solid rgba(255,255,255,.07); }
    .btn-cancel { display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:10px;padding:.65rem 1.2rem;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .18s; }
    .btn-cancel:hover { background:rgba(255,255,255,.12); }
    .btn-save { display:inline-flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;color:#fff;border-radius:10px;padding:.65rem 1.4rem;font-size:.88rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(245,158,11,.35);transition:filter .15s,transform .15s; }
    .btn-save:hover { filter:brightness(1.1);transform:translateY(-1px); }
    .btn-save:disabled { opacity:.5;cursor:not-allowed;transform:none; }
    .btn-save .material-icons-round,.btn-cancel .material-icons-round { font-size:1rem; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Confirm */
    .cfm-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:700;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .18s; }
    .cfm-overlay.open { opacity:1;pointer-events:all; }
    .cfm-box { background:#0d1525;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:1.75rem;max-width:340px;width:100%;text-align:center;transform:scale(.95);transition:transform .18s;box-shadow:0 24px 60px rgba(0,0,0,.7); }
    .cfm-overlay.open .cfm-box { transform:none; }
    .cfm-icon { width:52px;height:52px;border-radius:50%;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem; }
    .cfm-icon .material-icons-round { font-size:1.4rem;color:#f87171; }
    .cfm-title { font-size:1rem;font-weight:700;margin-bottom:.4rem; }
    .cfm-text  { font-size:.84rem;color:rgba(255,255,255,.5);margin-bottom:1.25rem;line-height:1.5; }
    .cfm-btns  { display:flex;gap:.75rem;justify-content:center; }
    .cfm-no  { flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:10px;padding:.6rem;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .18s; }
    .cfm-no:hover { background:rgba(255,255,255,.12); }
    .cfm-yes { flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);border:none;color:#fff;border-radius:10px;padding:.6rem;font-size:.88rem;font-weight:700;cursor:pointer;transition:filter .15s; }
    .cfm-yes:hover { filter:brightness(1.1); }

    @media(max-width:600px){ .main{padding:1rem} .hdr{padding:.6rem 1rem} }
  </style>
</head>
<body>

<header class="hdr">
  <a href="dashboard.html" class="hdr-brand"><img src="logo-big.png" alt="Сүлд"><span class="brand-name">Сүлд Систем</span></a>
  <div class="hdr-user">
    <button class="usr-btn" id="usr-btn"><div class="av" id="av-sm">?</div><span id="hdr-name">...</span><span class="material-icons-round chevron">expand_more</span></button>
    <div class="dropdown" id="dropdown">
      <div class="dp-head"><div class="av-lg" id="av-lg">?</div><div><div class="dp-nm" id="dp-nm">—</div><div class="dp-sub">Хэрэглэгч</div></div></div>
      <div class="dp-body"><div class="dp-row"><span class="material-icons-round">badge</span><span id="dp-un">—</span></div><div class="dp-row"><span class="material-icons-round">corporate_fare</span><span id="dp-div">—</span></div></div>
      <div class="dp-foot"><div class="dp-divider"></div><button class="logout-btn" id="logout-btn"><span class="material-icons-round">logout</span>Гарах</button></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="pg-hdr">
    <a href="dashboard.html" class="back-btn"><span class="material-icons-round">arrow_back</span>Буцах</a>
    <h1 class="pg-title"><span class="material-icons-round">report_problem</span>Гэмтэл<span class="count-pill" id="count-pill">—</span></h1>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><span class="material-icons-round">search</span><input class="search-inp" id="search" type="text" placeholder="Хайх..."></div>
    <button class="filter-btn active" data-filter="all">Бүгд</button>
    <button class="filter-btn" data-filter="drunk">Согтуу</button>
    <button class="filter-btn" data-filter="theft">Хулгай</button>
    <button class="filter-btn" data-filter="traffic">Зам тээврийн</button>
    <button class="add-btn" id="add-btn"><span class="material-icons-round">add</span>Шинэ бүртгэл</button>
  </div>
  <div class="cards-grid" id="cards-grid"><div class="state-msg"><span class="material-icons-round">sync</span>Мэдээлэл татаж байна...</div></div>
</main>

<!-- Detail modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-top"><div class="modal-title"><span class="material-icons-round">report_problem</span><span id="modal-title-text">Гэмтэл</span></div><button class="close-btn" id="det-close"><span class="material-icons-round">close</span></button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Form modal -->
<div class="form-overlay" id="form-overlay">
  <div class="form-modal">
    <div class="fm-top"><div class="fm-title"><span class="material-icons-round">report_problem</span><span id="fm-title">Шинэ гэмтэл</span></div><button class="close-btn" id="fm-close"><span class="material-icons-round">close</span></button></div>
    <form id="inc-form" novalidate>
      <div class="fm-body">
        <div class="fm-alert" id="fm-alert"><span class="material-icons-round">error_outline</span><span id="fm-alert-msg"></span></div>
        <div class="fm-grid">
          <div class="f-group fm-full">
            <label class="f-label"><span class="material-icons-round">business</span>Салбар<span class="req">*</span></label>
            <select class="f-select" id="f-branch" required>
              <option value="">— Салбар сонгох —</option>
            </select>
            <span class="f-err" id="f-branch-err">Заавал сонгоно уу</span>
          </div>
          <div class="f-group">
            <label class="f-label"><span class="material-icons-round">calendar_today</span>Огноо</label>
            <input class="f-input" id="f-date" type="date">
          </div>
          <div class="f-group">
            <label class="f-label"><span class="material-icons-round">schedule</span>Цаг</label>
            <input class="f-input" id="f-time" type="time">
          </div>
          <div class="f-group">
            <label class="f-label"><span class="material-icons-round">timer</span>Хариу хугацаа (мин)</label>
            <input class="f-input" id="f-resptime" type="number" min="0" placeholder="0">
          </div>
        </div>

        <div class="f-group">
          <label class="f-label"><span class="material-icons-round">category</span>Гэмтлийн төрөл</label>
          <div class="checks-grid">
            <div class="chk-item"><input type="checkbox" id="c-drunk">   <label for="c-drunk">Согтуу</label></div>
            <div class="chk-item"><input type="checkbox" id="c-theft">   <label for="c-theft">Хулгай</label></div>
            <div class="chk-item"><input type="checkbox" id="c-traffic"> <label for="c-traffic">Зам тээврийн</label></div>
            <div class="chk-item"><input type="checkbox" id="c-phone">   <label for="c-phone">Утасны</label></div>
            <div class="chk-item"><input type="checkbox" id="c-water">   <label for="c-water">Усны дохио</label></div>
            <div class="chk-item"><input type="checkbox" id="c-police">  <label for="c-police">Цагдаа</label></div>
            <div class="chk-item"><input type="checkbox" id="c-other">   <label for="c-other">Бусад</label></div>
          </div>
        </div>

        <div class="f-group">
          <label class="f-label"><span class="material-icons-round">description</span>Үйл ажиллагааны тайлбар</label>
          <textarea class="f-textarea" id="f-desc" placeholder="Тайлбар оруулах..."></textarea>
        </div>
      </div>
      <div class="fm-foot">
        <button type="button" class="btn-cancel" id="fm-cancel"><span class="material-icons-round">close</span>Цуцлах</button>
        <button type="submit" class="btn-save" id="fm-save"><span class="material-icons-round">save</span>Хадгалах</button>
      </div>
    </form>
  </div>
</div>

<!-- Confirm delete -->
<div class="cfm-overlay" id="cfm-overlay">
  <div class="cfm-box">
    <div class="cfm-icon"><span class="material-icons-round">delete_forever</span></div>
    <div class="cfm-title">Гэмтэл устгах уу?</div>
    <div class="cfm-text" id="cfm-text">Энэ үйлдлийг буцаах боломжгүй.</div>
    <div class="cfm-btns"><button class="cfm-no" id="cfm-no">Үгүй</button><button class="cfm-yes" id="cfm-yes">Тийм, устгах</button></div>
  </div>
</div>

<script>
const token = localStorage.getItem('accessToken');
if (!token) location.href = 'index.html';

const fname = localStorage.getItem('fname') || localStorage.getItem('username') || '?';
const uname = localStorage.getItem('username') || '';
const divv  = localStorage.getItem('division') || '';
document.getElementById('av-sm').textContent = fname.slice(0,2).toUpperCase();
document.getElementById('av-lg').textContent = fname.slice(0,2).toUpperCase();
document.getElementById('hdr-name').textContent = fname;
document.getElementById('dp-nm').textContent = fname;
document.getElementById('dp-un').textContent = uname;
document.getElementById('dp-div').textContent = divv ? `Хэсэг: ${divv}` : '—';
const usrBtn = document.getElementById('usr-btn'), dd = document.getElementById('dropdown');
usrBtn.addEventListener('click', e => { e.stopPropagation(); usrBtn.classList.toggle('open'); dd.classList.toggle('open'); });
document.addEventListener('click', () => { usrBtn.classList.remove('open'); dd.classList.remove('open'); });
dd.addEventListener('click', e => e.stopPropagation());
document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); location.href = 'index.html'; });

// ── Types ──
const TYPES = [
  { key:'is_drunk',       label:'Согтуу',        css:'tag-drunk',   icon:'local_bar',      chk:'c-drunk'   },
  { key:'is_theft',       label:'Хулгай',         css:'tag-theft',   icon:'security',       chk:'c-theft'   },
  { key:'is_traffic',     label:'Зам тээврийн',  css:'tag-traffic', icon:'directions_car', chk:'c-traffic' },
  { key:'is_phone',       label:'Утасны',         css:'tag-phone',   icon:'phone_in_talk',  chk:'c-phone'   },
  { key:'is_water_alarm', label:'Усны дохио',     css:'tag-water',   icon:'water_damage',   chk:'c-water'   },
  { key:'is_police',      label:'Цагдаа',         css:'tag-police',  icon:'local_police',   chk:'c-police'  },
  { key:'is_other',       label:'Бусад',          css:'tag-other',   icon:'more_horiz',     chk:'c-other'   },
];

let allIncidents = [], branchMap = {}, branchList = [];
let editingId = null, deleteId = null;
let curFilter = 'all', curSearch = '';

const H = { 'Authorization':`Bearer ${token}`, 'Content-Type':'application/json' };

function isTrue(v) { return v===true || v==='t' || v===1; }
function fmtDate(d) { if(!d)return'—'; const dt=new Date(d); return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`; }
function getTags(inc) { return TYPES.filter(t => isTrue(inc[t.key])); }
function tagsHtml(tags) {
  if(!tags.length) return`<span class="tag tag-other"><span class="material-icons-round">more_horiz</span>Бусад</span>`;
  return tags.map(t=>`<span class="tag ${t.css}"><span class="material-icons-round">${t.icon}</span>${t.label}</span>`).join('');
}

function getFiltered() {
  return allIncidents.filter(inc => {
    if(curSearch){ const bn=(branchMap[inc.branch_id]||'').toLowerCase(); const ds=(inc.action_description||'').toLowerCase(); if(!bn.includes(curSearch)&&!ds.includes(curSearch)) return false; }
    if(curFilter==='all') return true;
    if(curFilter==='drunk')   return isTrue(inc.is_drunk);
    if(curFilter==='theft')   return isTrue(inc.is_theft);
    if(curFilter==='traffic') return isTrue(inc.is_traffic);
    return true;
  });
}

function renderCards(list) {
  const grid = document.getElementById('cards-grid');
  if(!list.length){ grid.innerHTML='<div class="state-msg"><span class="material-icons-round">search_off</span>Олдсонгүй</div>'; return; }
  grid.innerHTML = list.map((inc,i) => {
    const tags  = getTags(inc);
    const bname = branchMap[inc.branch_id]||(inc.branch_id?`Салбар #${inc.branch_id}`:'—');
    return `
      <div class="incident-card" style="animation-delay:${i*.03}s">
        <div class="ic-head"><span class="ic-id">#${inc.id}</span><span class="ic-date">${fmtDate(inc.incident_date)}</span></div>
        <div class="ic-branch"><span class="material-icons-round">business</span>${bname}</div>
        <div class="ic-tags">${tagsHtml(tags)}</div>
        ${inc.action_description?`<div class="ic-desc">${inc.action_description.trim()}</div>`:''}
        <div class="ic-foot">
          ${inc.response_time_minutes!=null?`<span class="ic-time"><span class="material-icons-round">timer</span>${inc.response_time_minutes} мин</span>`:'<span></span>'}
          <div class="ic-actions">
            <button class="ic-btn view-btn" title="Харах"  onclick="openDetail(${inc.id})"><span class="material-icons-round">visibility</span></button>
            <button class="ic-btn edit-btn" title="Засах"  onclick="openForm(${inc.id})"><span class="material-icons-round">edit</span></button>
            <button class="ic-btn del-btn"  title="Устгах" onclick="confirmDelete(${inc.id})"><span class="material-icons-round">delete</span></button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// Detail
function openDetail(id) {
  const inc = allIncidents.find(x=>x.id===id); if(!inc) return;
  const tags  = getTags(inc);
  const bname = branchMap[inc.branch_id]||(inc.branch_id?`Салбар #${inc.branch_id}`:'—');
  document.getElementById('modal-title-text').textContent = `Гэмтэл #${inc.id}`;
  const fields = [
    {label:'Огноо',icon:'calendar_today',val:fmtDate(inc.incident_date)},
    {label:'Дуудлага хүлээн авсан',icon:'schedule',val:inc.call_received_time||'—'},
    {label:'Салбар',icon:'business',val:bname},
    {label:'Хариу хугацаа',icon:'timer',val:inc.response_time_minutes!=null?`${inc.response_time_minutes} минут`:'—'},
    {label:'Бүртгэгдсэн',icon:'event',val:inc.created_at?new Date(inc.created_at).toLocaleString('mn-MN'):'—'},
  ];
  document.getElementById('modal-body').innerHTML = `
    <div class="m-tags">${tagsHtml(tags)}</div>
    <div class="info-grid">${fields.map(f=>`<div class="info-item"><div class="info-label"><span class="material-icons-round">${f.icon}</span>${f.label}</div><div class="info-val">${f.val}</div></div>`).join('')}</div>
    ${inc.action_description?`<div class="desc-section"><div class="desc-label"><span class="material-icons-round">description</span>Тайлбар</div><div class="desc-text">${inc.action_description}</div></div>`:''}
  `;
  openOverlay('overlay');
}
document.getElementById('det-close').addEventListener('click', ()=>closeOverlay('overlay'));
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeOverlay('overlay'); });

// Form
function populateBranchSelect(selectedId) {
  const sel = document.getElementById('f-branch');
  sel.innerHTML = '<option value="">— Салбар сонгох —</option>' +
    branchList.map(b=>`<option value="${b.id}"${b.id===selectedId?' selected':''}>${b.b_name}</option>`).join('');
}

function resetForm() {
  document.getElementById('inc-form').reset();
  document.getElementById('fm-alert').classList.remove('show');
  document.getElementById('f-branch-err').classList.remove('show');
  TYPES.forEach(t => { document.getElementById(t.chk).checked = false; });
}

function openForm(id=null) {
  resetForm();
  editingId = id;
  const today = new Date().toISOString().split('T')[0];
  if(id) {
    const inc = allIncidents.find(x=>x.id===id); if(!inc) return;
    document.getElementById('fm-title').textContent = `Гэмтэл #${inc.id} засах`;
    populateBranchSelect(inc.branch_id);
    document.getElementById('f-date').value     = inc.incident_date ? inc.incident_date.split('T')[0] : today;
    document.getElementById('f-time').value     = inc.call_received_time ? inc.call_received_time.slice(0,5) : '';
    document.getElementById('f-resptime').value = inc.response_time_minutes ?? '';
    document.getElementById('f-desc').value     = inc.action_description || '';
    TYPES.forEach(t => { document.getElementById(t.chk).checked = isTrue(inc[t.key]); });
  } else {
    document.getElementById('fm-title').textContent = 'Шинэ гэмтэл бүртгэх';
    populateBranchSelect(null);
    document.getElementById('f-date').value = today;
  }
  openOverlay('form-overlay');
}

document.getElementById('add-btn').addEventListener('click', ()=>openForm());
document.getElementById('fm-close').addEventListener('click', ()=>closeOverlay('form-overlay'));
document.getElementById('fm-cancel').addEventListener('click', ()=>closeOverlay('form-overlay'));
document.getElementById('form-overlay').addEventListener('click', e=>{ if(e.target.id==='form-overlay') closeOverlay('form-overlay'); });

document.getElementById('inc-form').addEventListener('submit', async e => {
  e.preventDefault();
  const branchId = document.getElementById('f-branch').value;
  const errEl    = document.getElementById('f-branch-err');
  if(!branchId){ errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  const saveBtn = document.getElementById('fm-save');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="material-icons-round" style="animation:spin 1s linear infinite">sync</span>Хадгалж байна...';

  const body = {
    branch_id:            parseInt(branchId),
    incident_date:        document.getElementById('f-date').value || null,
    call_received_time:   document.getElementById('f-time').value || null,
    response_time_minutes:document.getElementById('f-resptime').value !== '' ? Number(document.getElementById('f-resptime').value) : null,
    action_description:   document.getElementById('f-desc').value.trim() || null,
    is_drunk:   document.getElementById('c-drunk').checked,
    is_theft:   document.getElementById('c-theft').checked,
    is_traffic: document.getElementById('c-traffic').checked,
    is_phone:   document.getElementById('c-phone').checked,
    is_water_alarm: document.getElementById('c-water').checked,
    is_police:  document.getElementById('c-police').checked,
    is_other:   document.getElementById('c-other').checked,
  };

  try {
    const url    = editingId ? `/api/incidents/${editingId}` : '/api/incidents';
    const method = editingId ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, headers: H, body: JSON.stringify(body) });
    const data   = await res.json();
    if(!res.ok || !data.success) throw new Error(data.message||'Алдаа гарлаа');
    closeOverlay('form-overlay');
    await loadData();
  } catch(err) {
    document.getElementById('fm-alert-msg').textContent = err.message;
    document.getElementById('fm-alert').classList.add('show');
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<span class="material-icons-round">save</span>Хадгалах';
  }
});

// Confirm delete
function confirmDelete(id) {
  deleteId = id;
  document.getElementById('cfm-text').textContent = `Гэмтэл #${id}-г устгах уу? Энэ үйлдлийг буцаах боломжгүй.`;
  openOverlay('cfm-overlay');
}
document.getElementById('cfm-no').addEventListener('click', ()=>{ deleteId=null; closeOverlay('cfm-overlay'); });
document.getElementById('cfm-overlay').addEventListener('click', e=>{ if(e.target.id==='cfm-overlay'){ deleteId=null; closeOverlay('cfm-overlay'); } });
document.getElementById('cfm-yes').addEventListener('click', async () => {
  if(!deleteId) return;
  const btn = document.getElementById('cfm-yes');
  btn.textContent='Устгаж байна...'; btn.disabled=true;
  try {
    const res  = await fetch(`/api/incidents/${deleteId}`, { method:'DELETE', headers:H });
    const data = await res.json();
    if(!res.ok || !data.success) throw new Error(data.message||'Алдаа');
    closeOverlay('cfm-overlay'); deleteId=null;
    await loadData();
  } catch(err) { alert(err.message); }
  finally { btn.textContent='Тийм, устгах'; btn.disabled=false; }
});

// Filters & search
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); curFilter=btn.dataset.filter; renderCards(getFiltered());
  });
});
document.getElementById('search').addEventListener('input', function(){ curSearch=this.value.trim().toLowerCase(); renderCards(getFiltered()); });

// Overlay helpers
function openOverlay(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow='hidden'; }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') ['cfm-overlay','form-overlay','overlay'].forEach(closeOverlay); });

// Load data
async function loadData() {
  const h = { Authorization:`Bearer ${token}` };
  try {
    const [bRes, iRes] = await Promise.all([fetch('/api/branches'), fetch('/api/incidents',{headers:h})]);
    if(bRes.ok) {
      const bd = await bRes.json();
      branchList = bd.data || [];
      branchMap  = {};
      branchList.forEach(b=>{ branchMap[b.id]=b.b_name; });
    }
    if(!iRes.ok) throw new Error('incidents '+iRes.status);
    const { data } = await iRes.json();
    allIncidents = data || [];
    document.getElementById('count-pill').textContent = allIncidents.length;
    renderCards(getFiltered());
  } catch {
    document.getElementById('cards-grid').innerHTML='<div class="state-msg"><span class="material-icons-round">error_outline</span>Мэдээлэл татахад алдаа гарлаа</div>';
  }
}
loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сүлд Систем - Хэрэглэгч үүсгэх</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3b82f6, #8b5cf6);
      top: -120px; left: -120px;
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #06b6d4, #2563eb);
      bottom: -80px; right: -80px;
      animation: float 8s ease-in-out infinite reverse;
      animation-delay: 4s;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(28px) scale(1.05); }
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      animation: fadeUp .65s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Header */
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.1rem;
      box-shadow: 0 8px 28px rgba(59,130,246,.45), 0 0 0 10px rgba(59,130,246,.1);
    }
    .logo-ring .material-icons-round { font-size: 2rem; color:#fff; }

    .card-header h1 {
      font-size: 1.55rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: .02em;
    }
    .card-header p {
      font-size: .82rem;
      color: rgba(255,255,255,.45);
      margin-top: .3rem;
    }

    /* Form fields */
    .field { margin-bottom: 1rem; }
    .field label {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .78rem;
      font-weight: 700;
      color: rgba(255,255,255,.6);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .45rem;
    }
    .field label .material-icons-round { font-size: .95rem; color: #60a5fa; }

    .field input,
    .field select {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: .92rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field input::placeholder { color: rgba(255,255,255,.3); }
    .field input:focus,
    .field select:focus {
      border-color: #60a5fa;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(96,165,250,.2);
    }
    .field select option {
      background: #1e3a8a;
      color: #fff;
    }

    /* Two-column grid */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .9rem;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: .75rem;
      margin: 1.35rem 0;
    }
    .divider span {
      flex: 1; height: 1px;
      background: rgba(255,255,255,.1);
    }
    .divider p {
      font-size: .7rem; font-weight: 700;
      color: rgba(255,255,255,.3);
      text-transform: uppercase; letter-spacing: .08em;
      white-space: nowrap;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg,#f59e0b,#d97706);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: .98rem;
      font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      box-shadow: 0 8px 24px rgba(245,158,11,.35);
      transition: transform .17s, box-shadow .17s;
      letter-spacing: .02em;
      margin-top: 1.35rem;
    }
    .btn-submit:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 14px 32px rgba(245,158,11,.45); }
    .btn-submit:active { transform:scale(.97); }
    .btn-submit .material-icons-round { font-size: 1.1rem; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: .35rem;
      color: rgba(255,255,255,.4);
      font-size: .78rem; font-weight: 600;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color .15s;
    }
    .back-link:hover { color: rgba(255,255,255,.75); }
    .back-link .material-icons-round { font-size: 1rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
      padding: 11px 24px; border-radius: 14px;
      font-size: .88rem; font-weight: 700;
      opacity: 0; transition: all .3s; pointer-events: none; z-index: 100;
      white-space: nowrap;
    }
    #toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
    #toast.success { background:#065f46; color:#6ee7b7; border:1px solid rgba(110,231,183,.25); }
    #toast.error   { background:#7f1d1d; color:#fca5a5; border:1px solid rgba(252,165,165,.25); }
  </style>
</head>
<body>

  <div class="card">
    <a href="index.html" class="back-link">
      <span class="material-icons-round">arrow_back</span>
      Буцах
    </a>

    <div class="card-header">
      <div class="logo-ring">
        <span class="material-icons-round">person_add</span>
      </div>
      <h1>Шинэ хэрэглэгч үүсгэх</h1>
      <p>Системд шинэ эрхийн хэрэглэгч нэмэх</p>
    </div>

    <form id="createUserForm">

      <!-- Нэвтрэх мэдээлэл -->
      <div class="divider"><span></span><p>Нэвтрэх мэдээлэл</p><span></span></div>

      <div class="field">
        <label><span class="material-icons-round">badge</span> Нэвтрэх нэр</label>
        <input type="text" id="username" placeholder="username123" required>
      </div>

      <div class="field">
        <label><span class="material-icons-round">lock</span> Нууц үг</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="field">
        <label><span class="material-icons-round">corporate_fare</span>Харъяа</label>
        <select id="division" required>
          <option value="">— Сонгоно уу —</option>
          <option value="1">Менежер / Админ</option>
          <option value="2">Инженер</option>
          <option value="3">Оператор</option>
          <option value="4">Хүний нөөц</option>
        </select>
      </div>

      <!-- Хувийн мэдээлэл -->
      <div class="divider"><span></span><p>Хувийн мэдээлэл</p><span></span></div>

      <div class="field-row">
        <div class="field" style="margin-bottom:0;">
          <label><span class="material-icons-round">person</span> Нэр</label>
          <input type="text" id="fname" placeholder="Болд" required>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label><span class="material-icons-round">family_restroom</span> Овог</label>
          <input type="text" id="lname" placeholder="Баатар" required>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <span class="material-icons-round">save</span>
        Хадгалах
      </button>

    </form>
  </div>

  <div id="toast"></div>

  <script>
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      setTimeout(() => t.className = '', 3200);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('createUserForm');
      if (!form) { console.error("Элемент олдсонгүй: id='createUserForm'"); return; }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = form.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerHTML = '<span class="material-icons-round" style="animation:spin 1s linear infinite;">sync</span> Хадгалж байна...';

        const data = {
          username: document.getElementById('username')?.value.trim() || '',
          password: document.getElementById('password')?.value || '',
          division: parseInt(document.getElementById('division')?.value || '0'),
          fname:    document.getElementById('fname')?.value.trim() || '',
          lname:    document.getElementById('lname')?.value.trim() || ''
        };

        try {
          const res    = await fetch('/api/user/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
          const result = await res.json();

          if (res.ok) {
            showToast('✓ Амжилттай хадгалагдлаа!', 'success');
            form.reset();
          } else {
            showToast('✗ ' + (result.message || result.error || `Алдаа: ${res.status}`), 'error');
          }
        } catch (err) {
          console.error('Fetch алдаа:', err);
          showToast('✗ Сервертэй холбогдох боломжгүй', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<span class="material-icons-round">save</span> Хадгалах';
        }
      });
    });
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
